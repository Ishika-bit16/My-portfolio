name: Copilot Setup Steps

"on":
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Override unavailable model with supported default
        run: echo "COPILOT_AGENT_MODEL=sweagent-anthropic:claude-sonnet-4-5-20250929" >> "$GITHUB_ENV"
